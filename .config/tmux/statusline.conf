# vim: ft=tmux
# moonfly theme — github.com/bluz71/vim-moonfly-colors

# moonfly color palette
# bg:         #1c1c1c
# bg_dark:    #080808
# fg:         #9c9c9c  (inactive)
# current_bg: #353946
# blue:       #80a0ff  (active/accent)
# pink:       #e65e72  (activity/flags)
# orange:     #f09479  (session name)
# border:     #303030

# mode styling (visual mode, copy mode)
set -g mode-style "fg=#9c9c9c,bg=#353946"

# message styling
set -g message-style "fg=#9c9c9c,bg=#1c1c1c"
set -g message-command-style "fg=#1c1c1c,bg=#80a0ff"

# pane border styling
set -g pane-border-style "bg=#080808,fg=#303030"
set -g pane-active-border-style "bg=#080808,fg=#80a0ff"

# status bar general settings
set -g status "on"
set -g status-interval 1
set -g status-justify "left"

# status bar colors
set -g status-style "bg=#1c1c1c,fg=#9c9c9c"

# status bar length limits
set -g status-left-length "100"
set -g status-right-length "100"

# left status: session name with prefix highlight
set -g status-left "#[bg=#1c1c1c,fg=#f09479]#{?client_prefix,, #S }#[bg=#80a0ff,fg=#1c1c1c,bold]#{?client_prefix, #S ,}"

# right status: empty
set -g status-right ""

# window separator
setw -g window-status-separator "  "

# window status styling
setw -g window-status-style "bg=#1c1c1c,fg=#9c9c9c"
setw -g window-status-activity-style "bg=#80a0ff,fg=#1c1c1c"
setw -g window-status-bell-style "bg=#e65e72,fg=#1c1c1c,bold"

# window format: shows name if explicitly set, otherwise shows current directory
# if automatic-rename is off (0) → show window name (#W)
# if automatic-rename is on (1)  → show current directory basename
# #I = window number (muted), 󰌘 = ssh indicator
#
# checks processes on the specific pane tty
# grep '[s]sh' prevents grep from finding itself
setw -g window-status-format " #I #(ps -t #{pane_tty} | grep -q '[s]sh' && echo '󰌘 ')#{?#{==:#{automatic-rename},0},#W,#{b:pane_current_path}} "

setw -g window-status-current-format " #[fg=#9c9c9c]#I #[fg=#80a0ff]#(ps -t #{pane_tty} | grep -q '[s]sh' && echo '󰌘 ')#{?#{==:#{automatic-rename},0},#W,#{b:pane_current_path}} "

# display pane numbers (prefix + q)
set -g display-panes-active-colour "#80a0ff"
set -g display-panes-colour "#303030"

# clock mode (prefix + t)
setw -g clock-mode-colour "#80a0ff"
